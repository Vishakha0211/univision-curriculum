<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Week 3 - Stage Cards</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 680px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
            color: #222;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        p.subtitle {
            font-size: 13px;
            color: #666;
            margin-top: 0;
            margin-bottom: 28px;
        }

        .cards {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .card {
            flex: 1;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px 16px;
        }

        .card h2 {
            font-size: 14px;
            margin: 0 0 10px 0;
            color: #888;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .status {
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
            background: #f0f0f0;
            color: #555;
        }

        .status.running {
            background: #fff3cd;
            color: #7a5000;
        }

        .status.done {
            background: #d4edda;
            color: #1a5c2a;
        }

        button {
            padding: 10px 20px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            margin-right: 8px;
        }

        button:hover {
            background: #f0f0f0;
        }

        #log {
            margin-top: 20px;
            font-size: 13px;
            color: #555;
            min-height: 20px;
        }
    </style>
</head>

<body>

    <p class="subtitle">Week 3 exercise - state changes without React</p>

            <span class="status" id="status-input">waiting</span>

        </div>
        <div class="card">
            <h2>Output</h2>
            <span class="status" id="status-output">waiting</span>
        </div>
    </div>

    <button onclick="runPipeline()">Run pipeline</button>
    <button onclick="resetPipeline()">Reset</button>

    <p id="log"></p>
