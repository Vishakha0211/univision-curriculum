<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Week 3 - HTML and CSS basics</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f9f9f9;
            color: #222;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 4px;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-top: 0;
        }

        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px 20px;
            margin: 20px 0;
        }

        .card h2 {
            font-size: 16px;
            margin-top: 0;
        }

        .label {
            display: inline-block;
            background: #eee;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 13px;
            margin-right: 8px;
        }

        .confidence {
            font-size: 13px;
            color: #444;
        }

        button {
            background: #333;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #555;
        }

        #output {
            margin-top: 14px;
            font-size: 14px;
            color: #444;
            min-height: 20px;
        }
    </style>
</head>

<body>

    <h1>Detection results</h1>
    <p class="subtitle">Week 3 - HTML and CSS practice</p>

    <div class="card">
        <h2>Frame 1</h2>
        <span class="label">person</span>
        <span class="confidence">91% confidence</span>
    </div>

    <div class="card">
        <h2>Frame 2</h2>
        <span class="label">bicycle</span>
        <span class="confidence">72% confidence</span>
    </div>

    <button onclick="showDetails()">Show summary</button>

    <p id="output"></p>

    <script src="js_practice.js"></script>

</body>
</html>
